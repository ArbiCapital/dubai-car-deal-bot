name: Dubai bot — daily search

on:
  schedule:
    # 08:00 Europe/Madrid (CEST=UTC+2 verano, CET=UTC+1 invierno).
    # Disparamos a 06:00 y 07:00 UTC para cubrir ambos. El bot usa is_seen para
    # no duplicar deals si llegara a correr dos veces.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: bot
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      LOG_LEVEL: INFO
      RUN_ONCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run single search pass
        run: python -c "from main import job; job()"
